<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Kanji Puzzle Game">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0b3b2e"/>
    </linearGradient>
  </defs>

  <rect x="6" y="6" width="116" height="116" rx="22" fill="url(#bg)"/>
  <rect x="6" y="6" width="116" height="116" rx="22" fill="none" stroke="#e2e8f0" stroke-opacity="0.18"/>

  <!-- Stylized "K" built from kanvas-like strokes -->
  <g fill="none" stroke="#f8fafc" stroke-linecap="round" stroke-linejoin="round">
    <path d="M44 36 V92" stroke-width="10"/>
    <path d="M78 36 L52 64 L84 92" stroke-width="10"/>
  </g>

  <!-- Small puzzle dot -->
  <circle cx="86" cy="44" r="6" fill="#22c55e" fill-opacity="0.95"/>
</svg>
